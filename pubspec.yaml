name: solo_leveling_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  table_calendar: ^3.1.2  
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  image_picker: ^1.2.1
  shared_preferences: ^2.5.5
  audioplayers: ^6.6.0
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: "^0.13.1"

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/